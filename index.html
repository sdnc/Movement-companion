<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Practice Companion</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Sora:wght@300;400;500;600;700&display=swap');

  :root{
    --ink:#efe7dd; --ink-dim:#c9bdae; --ink-faint:#8d8072;
    --bg:#1a1420; --bg-2:#221a2a; --bg-card:#241c2d;
    --violet:#8a6bc9; --violet-dim:#5f4d84;
    --ochre:#c3903f; --sage:#7c8f66; --rose:#a9707a; --coral:#c46a55; --slate:#7c8494;
    --line:#3a2f45; --hairline: rgba(239,231,221,0.1);
  }
  *{box-sizing:border-box;}
  html,body{ height:100%; margin:0; }
  body{
    background:
      radial-gradient(1000px 500px at 15% -10%, rgba(138,107,201,0.16), transparent 60%),
      radial-gradient(800px 400px at 100% 0%, rgba(195,144,63,0.08), transparent 55%),
      var(--bg);
    color:var(--ink); font-family:'Sora',sans-serif; line-height:1.5;
    display:flex; justify-content:center;
    -webkit-tap-highlight-color: transparent;
  }
  .app{ width:100%; max-width:480px; min-height:100vh; padding:22px 18px 40px; display:flex; flex-direction:column; }

  h1,.disp{ font-family:'Fraunces',serif; font-weight:500; }

  /* Day tabs */
  .day-tabs{ display:flex; gap:6px; overflow-x:auto; padding-bottom:4px; margin-bottom:18px; }
  .day-tab{
    flex:0 0 auto; background:var(--bg-2); border:1px solid var(--hairline); color:var(--ink-faint);
    font-family:'Sora',sans-serif; font-size:12.5px; font-weight:600; padding:9px 13px; border-radius:99px;
    cursor:pointer; white-space:nowrap; transition:all .15s ease;
  }
  .day-tab.active{ background:var(--violet-dim); color:var(--ink); border-color:var(--violet); }

  .day-title{ font-size:19px; margin:0 0 2px; color:var(--ink); }
  .day-meta{ font-size:12.5px; color:var(--ink-faint); margin-bottom:18px; }

  /* Progress dots */
  .progress{ display:flex; gap:3px; margin-bottom:20px; }
  .progress i{ flex:1; height:4px; border-radius:3px; background:var(--line); display:block; }
  .progress i.done{ background:var(--violet-dim); }
  .progress i.current{ background:var(--violet); }

  /* Card */
  .card{
    background:var(--bg-card); border:1px solid var(--hairline); border-radius:20px;
    padding:26px 22px; flex:1; display:flex; flex-direction:column; align-items:center; text-align:center;
  }
  .phase-badge{
    font-size:11px; letter-spacing:0.1em; text-transform:uppercase; font-weight:700;
    padding:5px 12px; border-radius:99px; margin-bottom:16px;
  }
  .icon-wrap{
    width:104px; height:104px; border-radius:50%; background:var(--bg-2); border:1px solid var(--hairline);
    display:flex; align-items:center; justify-content:center; margin-bottom:20px;
  }
  .icon-wrap svg{ width:56px; height:56px; }

  .ex-name{ font-size:24px; color:var(--ink); margin:0 0 10px; line-height:1.2; }
  .ex-cue{ font-size:14.5px; color:var(--ink-dim); max-width:320px; margin:0 0 22px; font-style:italic; }

  .timer{
    font-family:'Fraunces',serif; font-size:56px; font-weight:400; color:var(--ink);
    font-variant-numeric:tabular-nums; margin-bottom:6px; letter-spacing:-0.01em;
  }
  .timer-label{ font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:var(--ink-faint); margin-bottom:22px; }

  .timer-controls{ display:flex; gap:10px; margin-bottom:26px; }
  .btn-round{
    width:56px; height:56px; border-radius:50%; border:1px solid var(--hairline); background:var(--bg-2);
    color:var(--ink); font-size:20px; display:flex; align-items:center; justify-content:center; cursor:pointer;
  }
  .btn-round.primary{ background:var(--violet); border-color:var(--violet); width:68px; height:68px; font-size:24px; }
  .btn-round:active{ transform:scale(0.94); }

  .nav-row{ display:flex; gap:10px; width:100%; margin-top:auto; }
  .btn-nav{
    flex:1; background:var(--bg-2); border:1px solid var(--hairline); color:var(--ink-dim);
    font-family:'Sora',sans-serif; font-size:13.5px; font-weight:600; padding:14px; border-radius:12px;
    cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px;
  }
  .btn-nav:active{ transform:scale(0.98); }
  .btn-nav:disabled{ opacity:0.35; }

  .auto-row{
    display:flex; align-items:center; justify-content:center; gap:8px; margin-top:14px;
    font-size:12.5px; color:var(--ink-faint);
  }
  .auto-row input{ accent-color:var(--violet); }

  .adjust-row{ display:flex; align-items:center; gap:10px; margin-bottom:4px; }
  .btn-adjust{
    background:var(--bg-2); border:1px solid var(--hairline); color:var(--ink-dim);
    font-family:'Sora',sans-serif; font-size:12.5px; font-weight:600; padding:7px 12px; border-radius:99px;
    cursor:pointer;
  }
  .btn-adjust:active{ transform:scale(0.95); }
  .btn-edit-toggle{
    background:transparent; border:none; color:var(--violet); font-size:12.5px; font-weight:600;
    cursor:pointer; padding:7px 4px; text-decoration:underline; text-underline-offset:3px;
  }
  .edit-input-row{
    display:none; align-items:center; gap:8px; margin-bottom:18px;
    background:var(--bg-2); border:1px solid var(--hairline); border-radius:12px; padding:10px 14px;
  }
  .edit-input-row.open{ display:flex; }
  .edit-input-row input{
    width:44px; background:var(--bg); border:1px solid var(--hairline); color:var(--ink);
    font-family:'Sora',sans-serif; font-size:15px; text-align:center; border-radius:8px; padding:6px 2px;
  }
  .edit-input-row span{ color:var(--ink-faint); font-size:13px; }
  .edit-input-row label{ font-size:11px; color:var(--ink-faint); }
  .btn-save-time{
    background:var(--violet); border:none; color:var(--ink); font-family:'Sora',sans-serif;
    font-size:12.5px; font-weight:600; padding:8px 14px; border-radius:8px; cursor:pointer; margin-left:auto;
  }
</style>
</head>
<body>
<div class="app">

  <div class="day-tabs" id="dayTabs"></div>
  <div class="day-title" id="dayTitle"></div>
  <div class="day-meta" id="dayMeta"></div>
  <div class="progress" id="progress"></div>

  <div class="card">
    <div class="phase-badge" id="phaseBadge"></div>
    <div class="icon-wrap" id="iconWrap"></div>
    <div class="ex-name" id="exName"></div>
    <div class="ex-cue" id="exCue"></div>

    <div class="timer" id="timerDisplay">00:00</div>
    <div class="timer-label" id="timerLabel">remaining</div>

    <div class="adjust-row">
      <button class="btn-adjust" id="minus15">−15s</button>
      <button class="btn-adjust" id="plus15">+15s</button>
      <button class="btn-edit-toggle" id="editToggle">Set exact time</button>
    </div>
    <div class="edit-input-row" id="editInputRow">
      <div>
        <label>min</label><br>
        <input type="number" id="minInput" min="0" max="59">
      </div>
      <span>:</span>
      <div>
        <label>sec</label><br>
        <input type="number" id="secInput" min="0" max="59">
      </div>
      <button class="btn-save-time" id="saveTimeBtn">Save</button>
    </div>

    <div class="timer-controls">
      <button class="btn-round" id="resetBtn" title="Restart timer">↺</button>
      <button class="btn-round primary" id="playBtn" title="Play/Pause">▶</button>
      <button class="btn-round" id="skipBtn" title="Skip to 0">⏭</button>
    </div>

    <div class="auto-row">
      <input type="checkbox" id="autoAdvance" checked>
      <label for="autoAdvance">Auto-advance when timer ends</label>
    </div>

    <div class="nav-row">
      <button class="btn-nav" id="prevBtn">‹ Back</button>
      <button class="btn-nav" id="nextBtn">Next ›</button>
    </div>
  </div>

</div>

<script>
/* ---------- DATA ---------- */
const PHASE_COLORS = { Isolation:'var(--slate)', Integration:'var(--ochre)', Improvisation:'var(--coral)', 'Cool-down':'var(--sage)' };
const PHASE_BG = { Isolation:'rgba(124,132,148,0.16)', Integration:'rgba(195,144,63,0.16)', Improvisation:'rgba(196,106,85,0.16)', 'Cool-down':'rgba(124,143,102,0.16)' };

const DAYS = [
{ title:"Push & Ground Force", tab:"Push", loc:"Gym", ex:[
  {phase:"Isolation", name:"Wrist & shoulder CARs", cue:"Slow circles, no rushing.", sec:240, icon:"stretch"},
  {phase:"Isolation", name:"Deep-squat hip warm-up", cue:"Sit low, rock, reach overhead.", sec:240, icon:"squat"},
  {phase:"Isolation", name:"Dead hang #1", cue:"Passive into active — let the spine decompress.", sec:180, icon:"hang"},
  {phase:"Isolation", name:"Ground force primer", cue:"Bear crawl / crab walk / ape reach — feel where the push originates.", sec:360, icon:"crawl"},
  {phase:"Isolation", name:"Handstand isolation", cue:"Wall walks, wrist-loaded holds.", sec:180, icon:"push"},
  {phase:"Integration", name:"Push-up progressions", cue:"Incline/decline + pike push-ups — 3–5 sec on the way down.", sec:540, icon:"push"},
  {phase:"Integration", name:"Crawl-to-press complex", cue:"Bear crawl → push-up → ape reach, one flowing pattern.", sec:420, icon:"crawl"},
  {phase:"Integration", name:"Dead hang #2", cue:"Reset grip and shoulders.", sec:120, icon:"hang"},
  {phase:"Integration", name:"Loaded / banded press", cue:"If equipment allows.", sec:240, icon:"push"},
  {phase:"Improvisation", name:"Free-flow: crawl / reach / press", cue:"No script — let the body suggest the next shape.", sec:360, icon:"flow"},
  {phase:"Improvisation", name:"Dead hang #3", cue:"Closing hang.", sec:120, icon:"hang"},
  {phase:"Cool-down", name:"Chest & shoulder opener", cue:"Slow breath, don't force the range.", sec:240, icon:"stretch"},
  {phase:"Cool-down", name:"Child's pose → cobra", cue:"Slow spinal wave.", sec:240, icon:"stretch"},
  {phase:"Cool-down", name:"Closing breath", cue:"Release through the front line.", sec:120, icon:"breath"}
]},
{ title:"Pull & Hang", tab:"Pull", loc:"Gym", ex:[
  {phase:"Isolation", name:"Shoulder CARs + scapular drills", cue:"Retraction/protraction — isolate the shoulder blade.", sec:240, icon:"stretch"},
  {phase:"Isolation", name:"Deep-squat hip warm-up", cue:"Sit low, rock, reach overhead.", sec:240, icon:"squat"},
  {phase:"Isolation", name:"Dead hang #1", cue:"Passive into scapular engagement.", sec:180, icon:"hang"},
  {phase:"Isolation", name:"Hollow body + active hang", cue:"Where do you brace against being hung?", sec:360, icon:"hang"},
  {phase:"Isolation", name:"Grip isolation", cue:"Short finger / towel-grip holds.", sec:180, icon:"hang"},
  {phase:"Integration", name:"Pull-up progressions", cue:"Slow negatives (5–8 sec down), banded, chin-over-bar holds.", sec:480, icon:"pull"},
  {phase:"Integration", name:"Hang-to-pull-to-carry complex", cue:"Hang → scap pull → row → carry, one pattern.", sec:360, icon:"pull"},
  {phase:"Integration", name:"Dead hang #2", cue:"Reset between rows.", sec:120, icon:"hang"},
  {phase:"Integration", name:"Rows & grip work", cue:"Varied angles.", sec:240, icon:"pull"},
  {phase:"Improvisation", name:"Free-flow: hang / pull / retreat", cue:"No fixed order.", sec:480, icon:"flow"},
  {phase:"Improvisation", name:"Dead hang #3", cue:"Closing hang.", sec:120, icon:"hang"},
  {phase:"Cool-down", name:"Lat stretch & thoracic rotation", cue:"Slow, held.", sec:300, icon:"stretch"},
  {phase:"Cool-down", name:"Forearm & wrist release", cue:"After grip-heavy work.", sec:180, icon:"stretch"},
  {phase:"Cool-down", name:"Breath into the back body", cue:"The side you rarely feel.", sec:120, icon:"breath"}
]},
{ title:"Ground Flow & Integration", tab:"Ground Flow", loc:"Outside — no equipment", ex:[
  {phase:"Isolation", name:"Grounding & breath", cue:"Seated stillness, slow body scan.", sec:300, icon:"breath"},
  {phase:"Isolation", name:"Deep-squat hip warm-up", cue:"Extended — let the hips actually open.", sec:240, icon:"squat"},
  {phase:"Isolation", name:"Dead hang #1", cue:"Branch or park bar — short hang if nothing's around.", sec:180, icon:"hang"},
  {phase:"Isolation", name:"Hip & ankle CARs", cue:"Isolated joint circles.", sec:180, icon:"stretch"},
  {phase:"Integration", name:"Animal flow circuit", cue:"Bear / crab / ape / underswitch / scorpion / monkey — short combos.", sec:900, icon:"crawl"},
  {phase:"Improvisation", name:"Unscripted ground flow", cue:"Let one shape suggest the next.", sec:780, icon:"flow"},
  {phase:"Improvisation", name:"Dead hang #2", cue:"If a bar's nearby.", sec:120, icon:"hang"},
  {phase:"Cool-down", name:"Hamstring & adductor stretches", cue:"Breathe, don't force.", sec:300, icon:"stretch"},
  {phase:"Cool-down", name:"Psoas release", cue:"Supported lunge hold.", sec:240, icon:"stretch"},
  {phase:"Cool-down", name:"Jaw–occiput release", cue:"Supine, paired with slow pelvic-floor breath.", sec:180, icon:"breath"},
  {phase:"Cool-down", name:"Closing stillness", cue:"Spinal waves, then quiet intention.", sec:180, icon:"breath"}
]},
{ title:"Legs, Ground & Inversion", tab:"Legs", loc:"Gym", ex:[
  {phase:"Isolation", name:"Ankle & hip CARs", cue:"Isolated joint circles.", sec:240, icon:"stretch"},
  {phase:"Isolation", name:"Deep-squat hip warm-up", cue:"Extend the hold and rocking here.", sec:240, icon:"squat"},
  {phase:"Isolation", name:"Dead hang #1", cue:"Decompress before loading the legs.", sec:180, icon:"hang"},
  {phase:"Isolation", name:"Pistol squat isolation", cue:"Box pistols — track exactly where the wobble starts.", sec:360, icon:"squat"},
  {phase:"Isolation", name:"Handstand isolation (light)", cue:"Wall kick-ups, just for frequency.", sec:180, icon:"push"},
  {phase:"Integration", name:"Squat-to-carry-to-balance complex", cue:"Pistol → single-leg reach → carry.", sec:540, icon:"squat"},
  {phase:"Integration", name:"Loaded leg work", cue:"Split squats, RDLs, calf raises — tempo over load.", sec:540, icon:"squat"},
  {phase:"Integration", name:"Dead hang #2", cue:"Decompress between loaded sets.", sec:120, icon:"hang"},
  {phase:"Improvisation", name:"Reactive balance play", cue:"Unscripted stance transitions.", sec:360, icon:"flow"},
  {phase:"Improvisation", name:"Dead hang #3", cue:"Closing hang.", sec:120, icon:"hang"},
  {phase:"Cool-down", name:"Couch stretch", cue:"Psoas release.", sec:240, icon:"stretch"},
  {phase:"Cool-down", name:"Hamstring floor stretch", cue:"Slow, breath-led.", sec:180, icon:"stretch"},
  {phase:"Cool-down", name:"Calf, soleus & forward fold", cue:"Close seated.", sec:180, icon:"stretch"}
]},
{ title:"Pulse — Locomotion & Cardio", tab:"Pulse", loc:"Anywhere", ex:[
  {phase:"Isolation", name:"Dynamic warm-up locomotion", cue:"Walk/jog — skips, shuffles, backward jog.", sec:300, icon:"cardio"},
  {phase:"Isolation", name:"Deep-squat hip warm-up", cue:"Sit low, rock, reach overhead.", sec:240, icon:"squat"},
  {phase:"Isolation", name:"Dead hang #1", cue:"If a bar or sturdy branch is nearby.", sec:180, icon:"hang"},
  {phase:"Isolation", name:"Breath-pace calibration", cue:"Find the pace where breath stays rhythmic.", sec:180, icon:"breath"},
  {phase:"Integration", name:"Main set", cue:"Intervals or locomotion complex — effort follows breath.", sec:1680, icon:"cardio"},
  {phase:"Integration", name:"Dead hang #2", cue:"Active rest if a bar's available.", sec:120, icon:"hang"},
  {phase:"Improvisation", name:"Free-form finishing surge", cue:"Reactive sprint/agility, your own rhythm.", sec:360, icon:"cardio"},
  {phase:"Improvisation", name:"Dead hang #3", cue:"Closing hang.", sec:120, icon:"hang"},
  {phase:"Cool-down", name:"Cool-down walk", cue:"Slow breath count-down.", sec:360, icon:"cardio"},
  {phase:"Cool-down", name:"Closing stillness", cue:"Resting heart rate return.", sec:240, icon:"breath"}
]}
];

/* ---------- ICONS (simple original line-art, no external assets) ---------- */
const ICONS = {
  crawl: `<svg viewBox="0 0 64 64" fill="none" stroke="var(--ink-dim)" stroke-width="3" stroke-linecap="round"><circle cx="20" cy="18" r="5" fill="var(--ink-dim)" stroke="none"/><path d="M20 24 L26 34 L40 30"/><path d="M26 34 L20 48"/><path d="M26 34 L34 46"/><path d="M40 30 L48 24"/><path d="M40 30 L44 42"/></svg>`,
  hang: `<svg viewBox="0 0 64 64" fill="none" stroke="var(--ink-dim)" stroke-width="3" stroke-linecap="round"><line x1="10" y1="14" x2="54" y2="14"/><circle cx="32" cy="24" r="5" fill="var(--ink-dim)" stroke="none"/><path d="M32 29 L20 14 M32 29 L44 14"/><path d="M32 29 L32 48"/><path d="M32 40 L24 54 M32 40 L40 54"/></svg>`,
  squat: `<svg viewBox="0 0 64 64" fill="none" stroke="var(--ink-dim)" stroke-width="3" stroke-linecap="round"><circle cx="32" cy="14" r="5" fill="var(--ink-dim)" stroke="none"/><path d="M32 19 L32 34"/><path d="M32 22 L18 30 M32 22 L46 30"/><path d="M32 34 L20 40 L20 52"/><path d="M32 34 L44 40 L44 52"/></svg>`,
  push: `<svg viewBox="0 0 64 64" fill="none" stroke="var(--ink-dim)" stroke-width="3" stroke-linecap="round"><circle cx="14" cy="40" r="5" fill="var(--ink-dim)" stroke="none"/><path d="M14 45 L30 40 L54 40"/><path d="M30 40 L30 54"/><path d="M18 28 L30 40 L42 26"/></svg>`,
  pull: `<svg viewBox="0 0 64 64" fill="none" stroke="var(--ink-dim)" stroke-width="3" stroke-linecap="round"><line x1="8" y1="12" x2="56" y2="12"/><circle cx="32" cy="22" r="5" fill="var(--ink-dim)" stroke="none"/><path d="M32 27 L18 20 M32 27 L46 20"/><path d="M32 27 L32 42 L24 54"/><path d="M32 42 L40 54"/></svg>`,
  stretch: `<svg viewBox="0 0 64 64" fill="none" stroke="var(--ink-dim)" stroke-width="3" stroke-linecap="round"><circle cx="24" cy="16" r="5" fill="var(--ink-dim)" stroke="none"/><path d="M24 21 L24 38"/><path d="M24 24 L10 20"/><path d="M24 24 L44 14"/><path d="M24 38 L16 52"/><path d="M24 38 L34 50"/></svg>`,
  breath: `<svg viewBox="0 0 64 64" fill="none" stroke="var(--ink-dim)" stroke-width="3" stroke-linecap="round"><circle cx="32" cy="32" r="16" stroke-dasharray="4 5"/><circle cx="32" cy="32" r="4" fill="var(--ink-dim)" stroke="none"/></svg>`,
  flow: `<svg viewBox="0 0 64 64" fill="none" stroke="var(--ink-dim)" stroke-width="3" stroke-linecap="round"><path d="M8 32 C 20 12, 44 52, 56 32"/><circle cx="8" cy="32" r="3" fill="var(--ink-dim)" stroke="none"/><circle cx="56" cy="32" r="3" fill="var(--ink-dim)" stroke="none"/></svg>`,
  cardio: `<svg viewBox="0 0 64 64" fill="none" stroke="var(--ink-dim)" stroke-width="3" stroke-linecap="round"><circle cx="40" cy="12" r="5" fill="var(--ink-dim)" stroke="none"/><path d="M40 17 L30 30 L40 36 L34 52"/><path d="M30 30 L16 26"/><path d="M40 36 L52 44"/></svg>`
};

/* ---------- STATE ---------- */
let dayIdx = 0, exIdx = 0, secondsLeft = 0, running = false, timerId = null;

const el = id => document.getElementById(id);
const fmt = s => `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;

function beep(){
  try{
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = 'sine'; o.frequency.value = 660;
    o.connect(g); g.connect(ctx.destination);
    g.gain.setValueAtTime(0.15, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
    o.start(); o.stop(ctx.currentTime + 0.4);
  }catch(e){}
}

function renderTabs(){
  el('dayTabs').innerHTML = DAYS.map((d,i) =>
    `<div class="day-tab ${i===dayIdx?'active':''}" data-i="${i}">${d.tab}</div>`
  ).join('');
  el('dayTabs').querySelectorAll('.day-tab').forEach(tab=>{
    tab.onclick = () => { dayIdx = +tab.dataset.i; exIdx = 0; loadExercise(); };
  });
}

function renderProgress(){
  const list = DAYS[dayIdx].ex;
  el('progress').innerHTML = list.map((_,i) =>
    `<i class="${i<exIdx?'done':i===exIdx?'current':''}"></i>`
  ).join('');
}

function loadExercise(){
  stopTimer();
  renderTabs();
  const day = DAYS[dayIdx];
  const ex = day.ex[exIdx];
  el('dayTitle').textContent = day.title;
  el('dayMeta').textContent = `${day.loc}  ·  ${exIdx+1} of ${day.ex.length}`;
  renderProgress();

  el('phaseBadge').textContent = ex.phase;
  el('phaseBadge').style.color = PHASE_COLORS[ex.phase];
  el('phaseBadge').style.background = PHASE_BG[ex.phase];
  el('phaseBadge').style.border = `1px solid ${PHASE_COLORS[ex.phase]}`;

  el('iconWrap').innerHTML = ICONS[ex.icon] || ICONS.flow;
  el('exName').textContent = ex.name;
  el('exCue').textContent = ex.cue;

  secondsLeft = ex.sec;
  el('timerDisplay').textContent = fmt(secondsLeft);
  el('playBtn').textContent = '▶';
  running = false;
  el('editInputRow').classList.remove('open');

  el('prevBtn').disabled = (dayIdx===0 && exIdx===0);
  el('nextBtn').disabled = false;
}

function tick(){
  if (secondsLeft > 0){
    secondsLeft--;
    el('timerDisplay').textContent = fmt(secondsLeft);
  }
  if (secondsLeft === 0){
    stopTimer();
    beep();
    if (el('autoAdvance').checked){
      setTimeout(()=> goNext(true), 500);
    }
  }
}

function startTimer(){
  if (secondsLeft <= 0) return;
  running = true;
  el('playBtn').textContent = '❚❚';
  timerId = setInterval(tick, 1000);
}
function stopTimer(){
  running = false;
  el('playBtn').textContent = '▶';
  if (timerId){ clearInterval(timerId); timerId = null; }
}

function goNext(autoStart){
  const list = DAYS[dayIdx].ex;
  if (exIdx < list.length - 1){
    exIdx++;
    loadExercise();
    if (autoStart) startTimer();
  } else if (dayIdx < DAYS.length - 1){
    dayIdx++; exIdx = 0;
    loadExercise();
  }
}
function goPrev(){
  if (exIdx > 0){ exIdx--; loadExercise(); }
  else if (dayIdx > 0){ dayIdx--; exIdx = DAYS[dayIdx].ex.length - 1; loadExercise(); }
}

/* ---------- TIMER EDITING ---------- */
function setDuration(newSec){
  newSec = Math.max(0, newSec);
  const ex = DAYS[dayIdx].ex[exIdx];
  ex.sec = newSec;         // updates the exercise's default duration (so Reset uses it too)
  secondsLeft = newSec;    // updates what's showing right now
  el('timerDisplay').textContent = fmt(secondsLeft);
}

el('minus15').onclick = () => { stopTimer(); setDuration(secondsLeft - 15); };
el('plus15').onclick  = () => { stopTimer(); setDuration(secondsLeft + 15); };

el('editToggle').onclick = () => {
  stopTimer();
  const row = el('editInputRow');
  const open = row.classList.toggle('open');
  if (open){
    el('minInput').value = Math.floor(secondsLeft / 60);
    el('secInput').value = secondsLeft % 60;
  }
};

el('saveTimeBtn').onclick = () => {
  const m = parseInt(el('minInput').value, 10) || 0;
  const s = parseInt(el('secInput').value, 10) || 0;
  setDuration(m * 60 + s);
  el('editInputRow').classList.remove('open');
};

el('playBtn').onclick = () => running ? stopTimer() : startTimer();
el('resetBtn').onclick = () => { stopTimer(); secondsLeft = DAYS[dayIdx].ex[exIdx].sec; el('timerDisplay').textContent = fmt(secondsLeft); };
el('skipBtn').onclick = () => { stopTimer(); secondsLeft = 0; el('timerDisplay').textContent = fmt(0); };
el('nextBtn').onclick = () => goNext(false);
el('prevBtn').onclick = () => goPrev();

loadExercise();
</script>
</body>
</html>
