<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Practice Companion</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Sora:wght@300;400;500;600;700&display=swap');

  :root{
    --ink:#efe7dd; --ink-dim:#c9bdae; --ink-faint:#8d8072;
    --bg:#1a1420; --bg-2:#221a2a; --bg-card:#241c2d;
    --violet:#8a6bc9; --violet-dim:#5f4d84;
    --ochre:#c3903f; --sage:#7c8f66; --rose:#a9707a; --coral:#c46a55; --slate:#7c8494;
    --line:#3a2f45; --hairline: rgba(239,231,221,0.1);
  }
  *{box-sizing:border-box;}
  html,body{ height:100%; margin:0; }
  body{
    background:
      radial-gradient(1000px 500px at 15% -10%, rgba(138,107,201,0.16), transparent 60%),
      radial-gradient(800px 400px at 100% 0%, rgba(195,144,63,0.08), transparent 55%),
      var(--bg);
    color:var(--ink); font-family:'Sora',sans-serif; line-height:1.5;
    display:flex; justify-content:center;
    -webkit-tap-highlight-color: transparent;
  }
  .app{ width:100%; max-width:480px; min-height:100vh; padding:22px 18px 40px; display:flex; flex-direction:column; }

  h1,.disp{ font-family:'Fraunces',serif; font-weight:500; }

  /* Day tabs */
  .day-tabs{
    display:flex; gap:6px; overflow-x:auto; padding:10px 0 10px; margin-bottom:14px;
    position:sticky; top:0; z-index:20; background:var(--bg);
    padding-top:calc(10px + env(safe-area-inset-top, 0px));
  }
  .day-tab{
    flex:0 0 auto; background:var(--bg-2); border:1px solid var(--hairline); color:var(--ink-faint);
    font-family:'Sora',sans-serif; font-size:12.5px; font-weight:600; padding:9px 13px; border-radius:99px;
    cursor:pointer; white-space:nowrap; transition:all .15s ease;
  }
  .day-tab.active{ background:var(--violet-dim); color:var(--ink); border-color:var(--violet); }

  .day-title{ font-size:19px; margin:0 0 2px; color:var(--ink); }
  .day-meta{ font-size:12.5px; color:var(--ink-faint); margin-bottom:18px; }

  /* Progress dots */
  .progress{ display:flex; gap:3px; margin-bottom:20px; }
  .progress i{ flex:1; height:4px; border-radius:3px; background:var(--line); display:block; }
  .progress i.done{ background:var(--violet-dim); }
  .progress i.current{ background:var(--violet); }

  /* Card */
  .card{
    background:var(--bg-card); border:1px solid var(--hairline); border-radius:20px;
    padding:26px 22px; flex:1; display:flex; flex-direction:column; align-items:center; text-align:center;
  }
  .phase-badge{
    font-size:11px; letter-spacing:0.1em; text-transform:uppercase; font-weight:700;
    padding:5px 12px; border-radius:99px; margin-bottom:16px;
  }
  .icon-wrap{ margin-bottom:20px; }
  .icon-wrap:not(.has-media){ display:none; }

  /* Portrait "reel" video/photo thumbnail — consistent size for every card */
  .icon-wrap.has-media{
    width:124px; height:220px; border-radius:16px; cursor:pointer; position:relative; overflow:hidden;
  }
  .icon-wrap.has-media video, .icon-wrap.has-media img{
    width:100%; height:100%; object-fit:cover; display:block;
  }
  .icon-wrap.has-media::after{
    content:'⤢'; position:absolute; bottom:9px; right:9px; width:28px; height:28px; border-radius:50%;
    background:rgba(10,7,14,0.55); color:var(--ink); font-size:13px; display:flex; align-items:center; justify-content:center;
    border:1px solid rgba(239,231,221,0.25);
  }

  /* Full-screen modal viewer */
  .video-modal{
    display:none; position:fixed; inset:0; background:rgba(10,7,14,0.95); z-index:999;
    align-items:center; justify-content:center;
  }
  .video-modal.open{ display:flex; }
  .video-modal video, .video-modal img{
    max-height:88vh; max-width:92vw; border-radius:14px; display:block;
  }
  .modal-close{
    position:absolute; top:22px; right:22px; width:46px; height:46px; border-radius:50%;
    background:var(--bg-2); border:1px solid var(--hairline); color:var(--ink); font-size:18px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
  }
  .modal-close:active{ transform:scale(0.94); }

  .ex-name{ font-size:24px; color:var(--ink); margin:0 0 10px; line-height:1.2; }
  .ex-cue{ font-size:14.5px; color:var(--ink-dim); max-width:320px; margin:0 0 22px; font-style:italic; }

  .sides-tag{
    display:none; font-size:12px; color:var(--violet); background:rgba(138,107,201,0.12);
    border:1px solid var(--violet-dim); padding:5px 12px; border-radius:99px; margin:-10px 0 22px;
  }
  .sides-tag.show{ display:inline-block; }

  .timer{
    font-family:'Fraunces',serif; font-size:56px; font-weight:400; color:var(--ink);
    font-variant-numeric:tabular-nums; margin-bottom:6px; letter-spacing:-0.01em;
  }
  .timer-label{ font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:var(--ink-faint); margin-bottom:22px; }

  .timer-controls{ display:flex; gap:10px; margin-bottom:26px; }
  .btn-round{
    width:56px; height:56px; border-radius:50%; border:1px solid var(--hairline); background:var(--bg-2);
    color:var(--ink); font-size:20px; display:flex; align-items:center; justify-content:center; cursor:pointer;
  }
  .btn-round.primary{ background:var(--violet); border-color:var(--violet); width:68px; height:68px; font-size:24px; }
  .btn-round:active{ transform:scale(0.94); }

  .nav-row{ display:flex; gap:10px; width:100%; margin-top:auto; }
  .btn-nav{
    flex:1; background:var(--bg-2); border:1px solid var(--hairline); color:var(--ink-dim);
    font-family:'Sora',sans-serif; font-size:13.5px; font-weight:600; padding:14px; border-radius:12px;
    cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px;
  }
  .btn-nav:active{ transform:scale(0.98); }
  .btn-nav:disabled{ opacity:0.35; }

  .auto-row{
    display:flex; align-items:center; justify-content:center; gap:8px; margin-top:14px;
    font-size:12.5px; color:var(--ink-faint);
  }
  .auto-row input{ accent-color:var(--violet); }

  .adjust-row{ display:flex; align-items:center; gap:10px; margin-bottom:4px; }
  .btn-adjust{
    background:var(--bg-2); border:1px solid var(--hairline); color:var(--ink-dim);
    font-family:'Sora',sans-serif; font-size:12.5px; font-weight:600; padding:7px 12px; border-radius:99px;
    cursor:pointer;
  }
  .btn-adjust:active{ transform:scale(0.95); }
  .btn-edit-toggle{
    background:transparent; border:none; color:var(--violet); font-size:12.5px; font-weight:600;
    cursor:pointer; padding:7px 4px; text-decoration:underline; text-underline-offset:3px;
  }
  .edit-input-row{
    display:none; align-items:center; gap:8px; margin-bottom:18px;
    background:var(--bg-2); border:1px solid var(--hairline); border-radius:12px; padding:10px 14px;
  }
  .edit-input-row.open{ display:flex; }
  .edit-input-row input{
    width:44px; background:var(--bg); border:1px solid var(--hairline); color:var(--ink);
    font-family:'Sora',sans-serif; font-size:15px; text-align:center; border-radius:8px; padding:6px 2px;
  }
  .edit-input-row span{ color:var(--ink-faint); font-size:13px; }
  .edit-input-row label{ font-size:11px; color:var(--ink-faint); }
  .btn-save-time{
    background:var(--violet); border:none; color:var(--ink); font-family:'Sora',sans-serif;
    font-size:12.5px; font-weight:600; padding:8px 14px; border-radius:8px; cursor:pointer; margin-left:auto;
  }
</style>
</head>
<body>
<div class="app">

  <div class="day-tabs" id="dayTabs"></div>
  <div class="day-title" id="dayTitle"></div>
  <div class="day-meta" id="dayMeta"></div>
  <div class="progress" id="progress"></div>

  <div class="card">
    <div class="phase-badge" id="phaseBadge"></div>
    <div class="icon-wrap" id="iconWrap"></div>
    <div class="ex-name" id="exName"></div>
    <div class="ex-cue" id="exCue"></div>
    <div class="sides-tag" id="sidesTag">↔ switch sides at halfway</div>

    <div class="timer" id="timerDisplay">00:00</div>
    <div class="timer-label" id="timerLabel">remaining</div>

    <div class="adjust-row">
      <button class="btn-adjust" id="minus15">−15s</button>
      <button class="btn-adjust" id="plus15">+15s</button>
      <button class="btn-edit-toggle" id="editToggle">Set exact time</button>
    </div>
    <div class="edit-input-row" id="editInputRow">
      <div>
        <label>min</label><br>
        <input type="number" id="minInput" min="0" max="59">
      </div>
      <span>:</span>
      <div>
        <label>sec</label><br>
        <input type="number" id="secInput" min="0" max="59">
      </div>
      <button class="btn-save-time" id="saveTimeBtn">Save</button>
    </div>

    <div class="timer-controls">
      <button class="btn-round" id="resetBtn" title="Restart timer">↺</button>
      <button class="btn-round primary" id="playBtn" title="Play/Pause">▶</button>
      <button class="btn-round" id="skipBtn" title="Skip to 0">⏭</button>
    </div>

    <div class="auto-row">
      <input type="checkbox" id="autoAdvance" checked>
      <label for="autoAdvance">Auto-advance when timer ends</label>
    </div>

    <div class="nav-row">
      <button class="btn-nav" id="prevBtn">‹ Back</button>
      <button class="btn-nav" id="nextBtn">Next ›</button>
    </div>
  </div>

  <div class="video-modal" id="videoModal">
    <button class="modal-close" id="modalClose">✕</button>
    <div id="modalContent"></div>
  </div>

</div>

<script>
/* ---------- DATA ---------- */
const PHASE_COLORS = { Isolation:'var(--slate)', Integration:'var(--ochre)', Improvisation:'var(--coral)', 'Cool-down':'var(--sage)' };
const PHASE_BG = { Isolation:'rgba(124,132,148,0.16)', Integration:'rgba(195,144,63,0.16)', Improvisation:'rgba(196,106,85,0.16)', 'Cool-down':'rgba(124,143,102,0.16)' };

const DAYS = [
{ title:"Morning Flow", tab:"AM", loc:"Home", ex:[
  {name:"Feet on ground, deep breaths", cue:"Slow circles, no rushing.", sec:60., media:"media/mantra.jpg"},
  {name:"Shoulder CARs", cue:"Slow circles, no rushing.", sec:120, media:"media/shouldercars.mp4"},
  {name:"Forward fold + elephant walk", cue:"", sec:90, media:"media/elephantwalk.mp4"},
  {name:"Wrist activation", cue:"Warm up and active wrists", sec:90, media:"media/wrists.jpg"},
  {name:"Ankle activation", cue:"Ankle warm-up", sec:90, media:"media/ankles.jpg"},
  {name:"Hip cars", cue:"Slow gentle movement, back stable, you could keep a water bottle there", sec:60, media:"media/hipcars.mp4"},
  {name:"Downward Dog -> Plank -> Cobra Flow", cue:"Warm up the body", sec:120, media:"media/flow.jpg"},
  {name:"Plank", cue:"Activate abs", sec:60},
  {name:"Push-ups", cue:"Vary wide and narrow stance, you may go incline/decline or use wall", sec:60},
  {name:"Squat-to-stand with reach", cue:"Deep breaths here, go slow", sec:90, media:"media/deepsquat.jpg"},
  {name:"Duck walk", cue:"Lower your hips into a deep, controlled squat and take small, steady steps and chest up", sec:90, media:"media/duckwalk.mp4"},
  {name:"Crab walk", cue:"Hands under shoulders, squeeze your shoulder blades down", sec:90, media:"media/crabwalk.mp4"},
  {name:"Dead bugs", cue:"Engaged core", sec:60, media:"media/deadbugs.jpg"},
  {name:"Boat pose", cue:"", sec:60, media:"media/boatpose.jpg"},
  {name:"Child's pose", cue:"", sec:60, media:"media/childspose.jpg"},
  {name:"Lymphatic drainage", cue:"Circular motions to activate lymph system", sec:120, media:"media/lymphdrain.jpg"},
  {name:"Vertical shake", cue:"Let the floor and gravity support you", sec:90, media:"media/vericalshake.mp4"},
  {name:"Face massage", cue:"Presence", sec:300, media:"media/facemassage.jpg"},
]},
{ title:"Pull & Hang", tab:"Pull", loc:"Gym", ex:[
  {phase:"Isolation", name:"Shoulder CARs + scapular drills", cue:"Retraction/protraction — isolate the shoulder blade.", sec:240},
  {phase:"Isolation", name:"Deep-squat hip warm-up", cue:"Sit low, rock, reach overhead.", sec:240},
  {phase:"Isolation", name:"Dead hang #1", cue:"Passive into scapular engagement.", sec:180},
  {phase:"Isolation", name:"Hollow body + active hang", cue:"Where do you brace against being hung?", sec:360},
  {phase:"Isolation", name:"Grip isolation", cue:"Short finger / towel-grip holds.", sec:180},
  {phase:"Integration", name:"Pull-up progressions", cue:"Slow negatives (5–8 sec down), banded, chin-over-bar holds.", sec:480},
  {phase:"Integration", name:"Hang-to-pull-to-carry complex", cue:"Hang → scap pull → row → carry, one pattern.", sec:360},
  {phase:"Integration", name:"Dead hang #2", cue:"Reset between rows.", sec:120},
  {phase:"Integration", name:"Rows & grip work", cue:"Varied angles.", sec:240},
  {phase:"Improvisation", name:"Free-flow: hang / pull / retreat", cue:"No fixed order.", sec:480},
  {phase:"Improvisation", name:"Dead hang #3", cue:"Closing hang.", sec:120},
  {phase:"Cool-down", name:"Lat stretch & thoracic rotation", cue:"Slow, held.", sec:300},
  {phase:"Cool-down", name:"Forearm & wrist release", cue:"After grip-heavy work.", sec:180},
  {phase:"Cool-down", name:"Breath into the back body", cue:"The side you rarely feel.", sec:120}
]},
{ title:"Ground Flow & Integration", tab:"Ground Flow", loc:"Outside — no equipment", ex:[
  {phase:"Isolation", name:"Grounding & breath", cue:"Seated stillness, slow body scan.", sec:300},
  {phase:"Isolation", name:"Deep-squat hip warm-up", cue:"Extended — let the hips actually open.", sec:240},
  {phase:"Isolation", name:"Dead hang #1", cue:"Branch or park bar — short hang if nothing's around.", sec:180},
  {phase:"Isolation", name:"Hip & ankle CARs", cue:"Isolated joint circles.", sec:180},
  {phase:"Integration", name:"Animal flow circuit", cue:"Bear / crab / ape / underswitch / scorpion / monkey — short combos.", sec:900},
  {phase:"Improvisation", name:"Unscripted ground flow", cue:"Let one shape suggest the next.", sec:780},
  {phase:"Improvisation", name:"Dead hang #2", cue:"If a bar's nearby.", sec:120},
  {phase:"Cool-down", name:"Hamstring & adductor stretches", cue:"Breathe, don't force.", sec:300},
  {phase:"Cool-down", name:"Psoas release", cue:"Supported lunge hold.", sec:240},
  {phase:"Cool-down", name:"Jaw–occiput release", cue:"Supine, paired with slow pelvic-floor breath.", sec:180},
  {phase:"Cool-down", name:"Closing stillness", cue:"Spinal waves, then quiet intention.", sec:180}
]},
{ title:"Legs, Ground & Inversion", tab:"Legs", loc:"Gym", ex:[
  {phase:"Isolation", name:"Ankle & hip CARs", cue:"Isolated joint circles.", sec:240},
  {phase:"Isolation", name:"Deep-squat hip warm-up", cue:"Extend the hold and rocking here.", sec:240},
  {phase:"Isolation", name:"Dead hang #1", cue:"Decompress before loading the legs.", sec:180},
  {phase:"Isolation", name:"Pistol squat isolation", cue:"Box pistols — track exactly where the wobble starts.", sec:360},
  {phase:"Isolation", name:"Handstand isolation (light)", cue:"Wall kick-ups, just for frequency.", sec:180},
  {phase:"Integration", name:"Squat-to-carry-to-balance complex", cue:"Pistol → single-leg reach → carry.", sec:540},
  {phase:"Integration", name:"Loaded leg work", cue:"Split squats, RDLs, calf raises — tempo over load.", sec:540},
  {phase:"Integration", name:"Dead hang #2", cue:"Decompress between loaded sets.", sec:120},
  {phase:"Improvisation", name:"Reactive balance play", cue:"Unscripted stance transitions.", sec:360},
  {phase:"Improvisation", name:"Dead hang #3", cue:"Closing hang.", sec:120},
  {phase:"Cool-down", name:"Couch stretch", cue:"Psoas release.", sec:240},
  {phase:"Cool-down", name:"Hamstring floor stretch", cue:"Slow, breath-led.", sec:180},
  {phase:"Cool-down", name:"Calf, soleus & forward fold", cue:"Close seated.", sec:180}
]},
{ title:"Pulse — Locomotion & Cardio", tab:"Pulse", loc:"Anywhere", ex:[
  {phase:"Isolation", name:"Dynamic warm-up locomotion", cue:"Walk/jog — skips, shuffles, backward jog.", sec:300},
  {phase:"Isolation", name:"Deep-squat hip warm-up", cue:"Sit low, rock, reach overhead.", sec:240},
  {phase:"Isolation", name:"Dead hang #1", cue:"If a bar or sturdy branch is nearby.", sec:180},
  {phase:"Isolation", name:"Breath-pace calibration", cue:"Find the pace where breath stays rhythmic.", sec:180},
  {phase:"Integration", name:"Main set", cue:"Intervals or locomotion complex — effort follows breath.", sec:1680},
  {phase:"Integration", name:"Dead hang #2", cue:"Active rest if a bar's available.", sec:120},
  {phase:"Improvisation", name:"Free-form finishing surge", cue:"Reactive sprint/agility, your own rhythm.", sec:360},
  {phase:"Improvisation", name:"Dead hang #3", cue:"Closing hang.", sec:120},
  {phase:"Cool-down", name:"Cool-down walk", cue:"Slow breath count-down.", sec:360},
  {phase:"Cool-down", name:"Closing stillness", cue:"Resting heart rate return.", sec:240}
]}
];

/* ---------- STATE ---------- */
let dayIdx = 0, exIdx = 0, secondsLeft = 0, running = false, timerId = null, sideSwitchPlayed = false;

const el = id => document.getElementById(id);
const fmt = s => `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;

/* ---------- END-OF-TIMER SOUND ---------- */
/* Set this to your own sound file's path, e.g. "media/timer-end.mp3" — or leave as null to use the built-in beep. */
const END_SOUND = null;

function beep(){
  if (END_SOUND){
    try{
      const audio = new Audio(END_SOUND);
      audio.volume = 0.8;
      audio.play().catch(()=>{});
      return;
    }catch(e){}
  }
  try{
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = 'sine'; o.frequency.value = 660;
    o.connect(g); g.connect(ctx.destination);
    g.gain.setValueAtTime(0.15, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
    o.start(); o.stop(ctx.currentTime + 0.4);
  }catch(e){}
}

/* ---------- HALFWAY "CHANGE SIDES" SOUND ---------- */
/* Set this to your own sound file's path — or leave as null to use the built-in double-pulse tone. */
const SIDE_SWITCH_SOUND = null;

function sideSwitchSound(){
  if (SIDE_SWITCH_SOUND){
    try{
      const audio = new Audio(SIDE_SWITCH_SOUND);
      audio.volume = 0.8;
      audio.play().catch(()=>{});
      return;
    }catch(e){}
  }
  try{
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [0, 0.18].forEach(delay => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = 'sine'; o.frequency.value = 440;
      o.connect(g); g.connect(ctx.destination);
      g.gain.setValueAtTime(0.15, ctx.currentTime + delay);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + 0.15);
      o.start(ctx.currentTime + delay); o.stop(ctx.currentTime + delay + 0.15);
    });
  }catch(e){}
}

function renderTabs(){
  el('dayTabs').innerHTML = DAYS.map((d,i) =>
    `<div class="day-tab ${i===dayIdx?'active':''}" data-i="${i}">${d.tab}</div>`
  ).join('');
  el('dayTabs').querySelectorAll('.day-tab').forEach(tab=>{
    tab.onclick = () => { dayIdx = +tab.dataset.i; exIdx = 0; loadExercise(); };
  });
}

function renderProgress(){
  const list = DAYS[dayIdx].ex;
  el('progress').innerHTML = list.map((_,i) =>
    `<i class="${i<exIdx?'done':i===exIdx?'current':''}"></i>`
  ).join('');
}

function loadExercise(){
  stopTimer();
  renderTabs();
  const day = DAYS[dayIdx];
  const ex = day.ex[exIdx];
  el('dayTitle').textContent = day.title;
  el('dayMeta').textContent = `${day.loc}  ·  ${exIdx+1} of ${day.ex.length}`;
  renderProgress();

  el('phaseBadge').textContent = ex.phase;
  el('phaseBadge').style.color = PHASE_COLORS[ex.phase];
  el('phaseBadge').style.background = PHASE_BG[ex.phase];
  el('phaseBadge').style.border = `1px solid ${PHASE_COLORS[ex.phase]}`;

  const wrap = el('iconWrap');
  if (ex.media){
    wrap.style.display = 'flex';
    wrap.classList.add('has-media');
    const isVideo = /\.(mp4|mov|webm)$/i.test(ex.media);
    wrap.innerHTML = isVideo
      ? `<video src="${ex.media}" muted loop autoplay playsinline></video>`
      : `<img src="${ex.media}" alt="${ex.name}">`;
    wrap.onclick = () => openModal(ex.media, isVideo, ex.name);
  } else {
    wrap.classList.remove('has-media');
    wrap.innerHTML = '';
    wrap.onclick = null;
    wrap.style.display = 'none';
  }
  el('exName').textContent = ex.name;
  el('exCue').textContent = ex.cue;
  el('sidesTag').classList.toggle('show', !!ex.sides);
  sideSwitchPlayed = false;

  secondsLeft = ex.sec;
  el('timerDisplay').textContent = fmt(secondsLeft);
  el('playBtn').textContent = '▶';
  running = false;
  el('editInputRow').classList.remove('open');
  closeModal();

  el('prevBtn').disabled = (dayIdx===0 && exIdx===0);
  el('nextBtn').disabled = false;
}

function tick(){
  if (secondsLeft > 0){
    secondsLeft--;
    el('timerDisplay').textContent = fmt(secondsLeft);

    const ex = DAYS[dayIdx].ex[exIdx];
    if (ex.sides && !sideSwitchPlayed && secondsLeft <= Math.floor(ex.sec / 2)){
      sideSwitchPlayed = true;
      sideSwitchSound();
    }
  }
  if (secondsLeft === 0){
    stopTimer();
    beep();
    if (el('autoAdvance').checked){
      setTimeout(()=> goNext(true), 500);
    }
  }
}

function startTimer(){
  if (secondsLeft <= 0) return;
  running = true;
  el('playBtn').textContent = '❚❚';
  timerId = setInterval(tick, 1000);
}
function stopTimer(){
  running = false;
  el('playBtn').textContent = '▶';
  if (timerId){ clearInterval(timerId); timerId = null; }
}

function goNext(autoStart){
  const list = DAYS[dayIdx].ex;
  if (exIdx < list.length - 1){
    exIdx++;
    loadExercise();
    if (autoStart) startTimer();
  } else if (dayIdx < DAYS.length - 1){
    dayIdx++; exIdx = 0;
    loadExercise();
  }
}
function goPrev(){
  if (exIdx > 0){ exIdx--; loadExercise(); }
  else if (dayIdx > 0){ dayIdx--; exIdx = DAYS[dayIdx].ex.length - 1; loadExercise(); }
}

/* ---------- FULL-SCREEN MEDIA VIEWER ---------- */
function openModal(src, isVideo, name){
  const content = el('modalContent');
  content.innerHTML = isVideo
    ? `<video src="${src}" controls autoplay playsinline></video>`
    : `<img src="${src}" alt="${name}">`;
  el('videoModal').classList.add('open');
}
function closeModal(){
  el('modalContent').innerHTML = '';   // stops video playback
  el('videoModal').classList.remove('open');
}
el('modalClose').onclick = closeModal;
el('videoModal').onclick = (e) => { if (e.target.id === 'videoModal') closeModal(); };

/* ---------- TIMER EDITING ---------- */
function setDuration(newSec){
  newSec = Math.max(0, newSec);
  const ex = DAYS[dayIdx].ex[exIdx];
  ex.sec = newSec;         // updates the exercise's default duration (so Reset uses it too)
  secondsLeft = newSec;    // updates what's showing right now
  sideSwitchPlayed = false; // re-arm the halfway sound against the new duration
  el('timerDisplay').textContent = fmt(secondsLeft);
}

el('minus15').onclick = () => { stopTimer(); setDuration(secondsLeft - 15); };
el('plus15').onclick  = () => { stopTimer(); setDuration(secondsLeft + 15); };

el('editToggle').onclick = () => {
  stopTimer();
  const row = el('editInputRow');
  const open = row.classList.toggle('open');
  if (open){
    el('minInput').value = Math.floor(secondsLeft / 60);
    el('secInput').value = secondsLeft % 60;
  }
};

el('saveTimeBtn').onclick = () => {
  const m = parseInt(el('minInput').value, 10) || 0;
  const s = parseInt(el('secInput').value, 10) || 0;
  setDuration(m * 60 + s);
  el('editInputRow').classList.remove('open');
};

el('playBtn').onclick = () => running ? stopTimer() : startTimer();
el('resetBtn').onclick = () => { stopTimer(); secondsLeft = DAYS[dayIdx].ex[exIdx].sec; sideSwitchPlayed = false; el('timerDisplay').textContent = fmt(secondsLeft); };
el('skipBtn').onclick = () => { stopTimer(); secondsLeft = 0; el('timerDisplay').textContent = fmt(0); };
el('nextBtn').onclick = () => goNext(false);
el('prevBtn').onclick = () => goPrev();

loadExercise();
</script>
</body>
</html>
